<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Meet Clone | No Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', Arial, sans-serif; background: #202124; color: white; height: 100vh; display: flex; flex-direction: column; }

        /* Header Area */
        header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; color: #e8eaed; display: flex; align-items: center; gap: 10px; }
        .time { color: #e8eaed; font-size: 18px; }

        /* Main Video Grid */
        #meeting-view {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            padding: 20px;
            align-content: center;
        }
        .video-box {
            background: #3c4043;
            border-radius: 8px;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .user-name { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 2px 10px; border-radius: 4px; font-size: 14px; }

        /* Bottom Control Bar */
        footer {
            height: 80px;
            background: #202124;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        .control-btn {
            width: 45px; height: 45px;
            border-radius: 50%;
            border: none;
            background: #3c4043;
            color: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .control-btn:hover { background: #4a4d51; }
        .leave-btn { background: #ea4335; width: 60px; border-radius: 25px; }
        .leave-btn:hover { background: #d93025; }

        /* Entry Screen */
        #lobby {
            position: fixed; inset: 0; background: white; color: #202124;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .join-box { text-align: center; max-width: 400px; }
        h1 { font-size: 32px; margin-bottom: 20px; font-weight: 400; }
        input { width: 100%; padding: 15px; border: 1px solid #dadce0; border-radius: 4px; margin-bottom: 15px; font-size: 16px; }
        .start-btn { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="join-box">
            <img src="https://www.gstatic.com/meet/google_meet_horizontal_wordmark_2020q4_1x_icon_124_40_2373e79660dabbf194273d27aa7ee1f0.png" alt="Meet" style="margin-bottom: 20px;">
            <h1>Ready to join?</h1>
            <input type="text" id="roomName" placeholder="Enter meeting code">
            <button class="start-btn" onclick="joinMeeting()">Join Now</button>
            <p style="margin-top: 15px; color: #5f6368; font-size: 14px;">No account or verification needed.</p>
        </div>
    </div>

    <header>
        <div class="logo">Ayon's Meet</div>
        <div class="time" id="clock">12:00 PM</div>
    </header>

    <div id="meeting-view">
        <div class="video-box">
            <div class="user-name">You (Camera Off)</div>
            <div style="font-size: 50px;">👤</div>
        </div>
        <div class="video-box" id="remote-video" style="display:none;">
            <div class="user-name">Friend</div>
            <div style="font-size: 50px;">👥</div>
        </div>
    </div>

    <footer>
        <button class="control-btn" title="Mute">🎤</button>
        <button class="control-btn" title="Camera">📷</button>
        <button class="control-btn" title="Captions">CC</button>
        <button class="control-btn leave-btn" onclick="location.reload()" title="Leave">📞</button>
        <button class="control-btn" title="Raise Hand">✋</button>
        <button class="control-btn" title="More Options">⋮</button>
    </footer>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateTime, 1000);
        updateTime();

        function joinMeeting() {
            const room = document.getElementById('roomName').value;
            if(!room) return alert("Code dao!");
            document.getElementById('lobby').style.display = 'none';
        }
    </script>
</body>
</html>
