<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayon's Voice CHAT</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: #10121a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }
        .container {
            background: #1c1f2e;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%; max-width: 350px;
        }
        h2 { color: #5865f2; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: none;
            border-radius: 8px;
            background: #2f3136;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #5865f2;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #4752c4; }
        #call-screen { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; background: #000; }
    </style>
</head>
<body>

    <div class="container" id="setup">
        <h2>Ayon's Voice</h2>
        <p style="color: #b9bbbe; font-size: 14px;">Bondhur sathe miliye ek-i name room khulo</p>
        
        <input type="text" id="username" placeholder="Username (e.g. ayon77)">
        <button onclick="joinAudioRoom()">Start Audio Call</button>
    </div>

    <div id="call-screen">
        <div id="meet-frame" style="height: 90%;"></div>
        <button onclick="location.reload()" style="height: 10%; border-radius: 0; background: #ed4245;">Leave Call</button>
    </div>

    <script>
        function joinAudioRoom() {
            const user = document.getElementById('username').value.trim();
            if (!user) {
                alert("Please enter a username!");
                return;
            }

            document.getElementById('setup').style.display = 'none';
            document.getElementById('call-screen').style.display = 'block';

            const domain = 'meet.jit.si';
            const options = {
                roomName: "AyonsVoice_" + user, // ইউনিক রুম নাম
                parentNode: document.querySelector('#meet-frame'),
                width: '100%',
                height: '100%',
                configOverwrite: {
                    startWithVideoMuted: true, // ভিডিও অটোমেটিক বন্ধ থাকবে
                    startWithAudioMuted: false,
                    prejoinPageEnabled: false
                },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: ['microphone', 'chat', 'hangup'], // শুধু অডিও কন্ট্রোল
                    SETTINGS_SECTIONS: ['devices', 'language']
                }
            };
            const api = new JitsiMeetExternalAPI(domain, options);
        }
    </script>
</body>
</html>
